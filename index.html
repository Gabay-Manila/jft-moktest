<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JFT-Basic CBT 模擬試験</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">

<style>
  /* ── DESIGN TOKENS ─────────────────────────────── */
  :root {
    --bg:        #0f0f1a;
    --surface:   #1a1a2e;
    --surface2:  #16213e;
    --card:      #1e1e35;
    --border:    rgba(255,255,255,.08);
    --accent:    #e94560;
    --accent2:   #0f3460;
    --gold:      #f5a623;
    --green:     #22c55e;
    --blue:      #3b82f6;
    --purple:    #a78bfa;
    --text:      #f1f1f5;
    --text2:     #9ca3af;
    --text3:     #6b7280;
    --radius:    12px;
    --radius-sm: 8px;
    --shadow:    0 8px 32px rgba(0,0,0,.4);
    --transition: .2s cubic-bezier(.4,0,.2,1);
  }

  /* ── RESET ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Meiryo', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; outline: none; }
  a { color: inherit; text-decoration: none; }

  /* ── LOADING SCREEN ────────────────────────────── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; z-index: 999;
  }
  .loader-ring {
    width: 56px; height: 56px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCREENS ───────────────────────────────────── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ══ START SCREEN ══════════════════════════════════ */
  #screen-start {
    align-items: center; justify-content: center;
    padding: 40px 20px;
    background: radial-gradient(ellipse at 20% 20%, #0f3460 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #16213e 0%, transparent 60%),
                var(--bg);
  }
  .start-inner { max-width: 600px; width: 100%; text-align: center; }
  .start-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(233,69,96,.15);
    border: 1px solid rgba(233,69,96,.3);
    color: var(--accent); font-size: 12px; font-weight: 700;
    letter-spacing: .12em; padding: 6px 16px; border-radius: 99px;
    margin-bottom: 24px; text-transform: uppercase;
  }
  .start-title {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 900; line-height: 1.15;
    letter-spacing: -.02em;
    margin-bottom: 8px;
  }
  .start-title span { color: var(--accent); }
  .start-subtitle {
    color: var(--text2); font-size: 15px; margin-bottom: 40px;
  }
  .start-stats {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 16px; margin-bottom: 36px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 12px;
  }
  .stat-card .num {
    font-size: 28px; font-weight: 900;
    color: var(--accent); line-height: 1;
    margin-bottom: 4px;
  }
  .stat-card .lbl { font-size: 12px; color: var(--text2); }

  .sections-grid {
    display: grid; grid-template-columns: repeat(2,1fr);
    gap: 10px; margin-bottom: 36px; text-align: left;
  }
  .section-chip {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
  }
  .section-chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .section-chip .info { flex: 1; }
  .section-chip .name { font-size: 13px; font-weight: 700; }
  .section-chip .detail { font-size: 11px; color: var(--text2); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--accent) 0%, #c0392b 100%);
    color: #fff; font-size: 16px; font-weight: 800;
    padding: 18px 32px; border-radius: var(--radius);
    letter-spacing: .04em;
    box-shadow: 0 4px 24px rgba(233,69,96,.35);
    transition: transform var(--transition), box-shadow var(--transition);
    margin-bottom: 12px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(233,69,96,.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2); font-size: 14px; font-weight: 600;
    padding: 14px 32px; border-radius: var(--radius);
    transition: background var(--transition), color var(--transition);
  }
  .btn-secondary:hover { background: var(--card); color: var(--text); }

  /* ══ EXAM SCREEN ═══════════════════════════════════ */
  #screen-exam { background: var(--bg); }

  /* Header */
  .exam-header {
    position: sticky; top: 0; z-index: 50;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }
  .exam-header-top {
    display: flex; align-items: center; justify-content: space-between;
    height: 52px; gap: 12px;
  }
  .exam-logo { font-size: 13px; font-weight: 800; color: var(--accent); letter-spacing: .06em; white-space: nowrap; }
  .timer-display {
    font-family: 'Courier New', monospace;
    font-size: 22px; font-weight: 900;
    letter-spacing: .04em; color: var(--text);
    transition: color var(--transition);
    min-width: 80px; text-align: center;
  }
  .timer-display.urgent { color: var(--accent); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
  .section-badge-header {
    font-size: 11px; font-weight: 700; padding: 4px 10px;
    border-radius: 99px; letter-spacing: .08em;
    white-space: nowrap;
  }

  /* Progress nav */
  .progress-nav {
    padding: 10px 0;
    overflow-x: auto;
  }
  .progress-nav-inner {
    display: flex; gap: 5px; min-width: max-content;
  }
  .nav-dot {
    width: 28px; height: 28px; border-radius: 6px;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all var(--transition);
    flex-shrink: 0;
  }
  .nav-dot.unanswered { background: var(--surface2); color: var(--text3); }
  .nav-dot.answered { background: var(--blue); color: #fff; }
  .nav-dot.current { border-color: var(--accent); }
  .nav-dot:hover { transform: scale(1.15); }

  /* Exam main */
  .exam-main {
    flex: 1; padding: 0;
    display: flex; flex-direction: column;
  }

  /* Standard layout */
  .question-standard {
    flex: 1; padding: 24px 20px;
    max-width: 720px; width: 100%; margin: 0 auto;
  }
  .q-meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .q-num {
    background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 800;
    padding: 3px 10px; border-radius: 99px; letter-spacing: .06em;
  }
  .q-section-tag {
    font-size: 11px; font-weight: 600; color: var(--text2);
    border: 1px solid var(--border); padding: 3px 8px; border-radius: 99px;
  }
  .q-instruction {
    color: var(--text2); font-size: 13px; margin-bottom: 16px;
    padding: 12px; background: var(--card); border-radius: var(--radius-sm);
    border-left: 3px solid var(--purple);
  }
  .q-text {
    font-size: 18px; font-weight: 700; margin-bottom: 24px;
    color: var(--text); line-height: 1.5;
  }

  /* CBT Card (listening) */
  .audio-player-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    margin-bottom: 20px; text-align: center;
  }
  .audio-icon { font-size: 40px; margin-bottom: 12px; }
  .audio-script {
    font-size: 12px; color: var(--text2); margin-bottom: 14px;
    background: var(--surface2); padding: 10px; border-radius: 6px;
    text-align: left; line-height: 1.6;
  }
  .audio-script--hidden { display: none !important; }

  /* Share button */
  .btn-share {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-size: 14px; font-weight: 700;
    padding: 14px 32px; border-radius: var(--radius);
    transition: all var(--transition); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-share:hover { background: var(--card); color: var(--text); border-color: var(--text3); }
  .btn-share.copied { border-color: var(--green); color: var(--green); }

  /* Toast notification */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #fff;
    font-size: 14px; font-weight: 700;
    padding: 12px 28px; border-radius: 99px;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
    opacity: 0; pointer-events: none;
    transition: opacity .3s ease, transform .3s ease;
    z-index: 999; white-space: nowrap;
  }
  .toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }
  .audio-controls { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .btn-play {
    background: var(--green); color: #fff;
    font-size: 13px; font-weight: 700;
    padding: 10px 24px; border-radius: 8px;
    transition: all var(--transition);
  }
  .btn-play:hover:not(:disabled) { background: #16a34a; transform: scale(1.04); }
  .btn-play:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  .play-count { font-size: 12px; color: var(--text2); }

  /* Split 2screen layout */
  .question-split {
    flex: 1; display: flex;
    height: calc(100vh - 140px);
    min-height: 400px;
  }
  .split-left {
    width: 50%; overflow-y: auto;
    padding: 20px; border-right: 1px solid var(--border);
    background: var(--surface2);
  }
  .split-right {
    width: 50%; overflow-y: auto;
    padding: 20px;
    display: flex; flex-direction: column;
  }
  .passage-label {
    font-size: 10px; font-weight: 800; letter-spacing: .12em;
    color: var(--gold); margin-bottom: 12px; text-transform: uppercase;
  }
  .passage-text {
    font-size: 14px; line-height: 1.8; color: var(--text);
    white-space: pre-line;
  }

  /* Choices */
  .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .choice-btn {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--card); border: 2px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    color: var(--text); font-size: 14px; font-weight: 500;
    text-align: left; transition: all var(--transition);
    width: 100%;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--blue); background: rgba(59,130,246,.1);
    transform: translateX(3px);
  }
  .choice-btn.selected {
    border-color: var(--blue); background: rgba(59,130,246,.15);
    color: #fff;
  }
  .choice-btn:disabled { cursor: not-allowed; }
  .choice-label {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface2); color: var(--text2);
    font-size: 11px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
    transition: all var(--transition);
  }
  .choice-btn.selected .choice-label {
    background: var(--blue); color: #fff;
  }

  /* Footer */
  .exam-footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .btn-nav {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; font-weight: 700;
    padding: 10px 20px; border-radius: var(--radius-sm);
    transition: all var(--transition);
    min-width: 80px;
  }
  .btn-nav:hover { background: var(--surface2); border-color: var(--text3); }
  .btn-nav:disabled { opacity: .3; cursor: not-allowed; }
  .btn-finish {
    background: linear-gradient(135deg, var(--green) 0%, #16a34a 100%);
    color: #fff; font-size: 13px; font-weight: 800;
    padding: 10px 20px; border-radius: var(--radius-sm);
    box-shadow: 0 4px 16px rgba(34,197,94,.3);
    transition: all var(--transition);
  }
  .btn-finish:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34,197,94,.4); }
  .q-progress-text { font-size: 12px; color: var(--text2); text-align: center; flex: 1; }

  /* ══ RESULT SCREEN ═════════════════════════════════ */
  #screen-result {
    background: radial-gradient(ellipse at 50% 0%, #0f3460 0%, transparent 60%), var(--bg);
    padding: 32px 20px 60px;
    align-items: center;
  }
  .result-inner { max-width: 760px; width: 100%; }

  .result-verdict {
    text-align: center; margin-bottom: 36px;
    padding: 32px 24px;
    background: var(--card); border-radius: 20px;
    border: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .result-verdict::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(233,69,96,.08) 0%, transparent 70%);
  }
  .verdict-icon { font-size: 56px; margin-bottom: 8px; }
  .verdict-label {
    font-size: 11px; font-weight: 800; letter-spacing: .15em;
    text-transform: uppercase; color: var(--text2); margin-bottom: 4px;
  }
  .verdict-text {
    font-size: clamp(36px,8vw,56px); font-weight: 900;
    letter-spacing: -.02em; line-height: 1;
  }
  .verdict-text.pass { color: var(--green); }
  .verdict-text.fail { color: var(--accent); }
  .verdict-reason {
    font-size: 14px; color: var(--text2); margin-top: 8px;
  }
  .verdict-score {
    display: inline-flex; align-items: baseline; gap: 4px;
    margin-top: 16px; background: var(--surface2);
    padding: 8px 20px; border-radius: 99px;
  }
  .verdict-score .big { font-size: 28px; font-weight: 900; }
  .verdict-score .slash { font-size: 18px; color: var(--text2); }
  .verdict-score .small { font-size: 18px; font-weight: 700; }
  .verdict-score .pct { font-size: 13px; color: var(--text2); margin-left: 4px; }

  /* Section score bars */
  .section-scores { margin-bottom: 32px; }
  .section-score-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    margin-bottom: 10px;
  }
  .section-score-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .section-score-name { font-size: 13px; font-weight: 700; }
  .section-score-nums { font-size: 13px; font-weight: 700; }
  .section-score-nums.pass { color: var(--green); }
  .section-score-nums.fail { color: var(--accent); }
  .score-bar-track {
    height: 8px; background: var(--surface2); border-radius: 99px;
    position: relative; overflow: visible;
  }
  .score-bar-fill {
    height: 100%; border-radius: 99px;
    transition: width 1s cubic-bezier(.34,1.56,.64,1);
  }
  .score-bar-fill.pass { background: linear-gradient(90deg, var(--green) 0%, #4ade80 100%); }
  .score-bar-fill.fail { background: linear-gradient(90deg, var(--accent) 0%, #fb7185 100%); }
  .cutoff-marker {
    position: absolute; top: -4px; bottom: -4px;
    width: 2px; background: var(--accent);
    border-radius: 1px;
  }
  .cutoff-label {
    position: absolute; top: -20px;
    transform: translateX(-50%);
    font-size: 9px; color: var(--accent);
    white-space: nowrap; font-weight: 700;
  }

  /* Untested message */
  .untested-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    margin-bottom: 28px;
    border-left: 3px solid var(--gold);
  }
  .untested-box h3 { font-size: 14px; font-weight: 800; color: var(--gold); margin-bottom: 8px; }
  .untested-box p { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* Review section */
  .review-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .review-header h2 { font-size: 18px; font-weight: 900; }
  .ruby-toggle {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 700; cursor: pointer;
    color: var(--text2); transition: all var(--transition);
  }
  .ruby-toggle.active { border-color: var(--purple); color: var(--purple); background: rgba(167,139,250,.1); }
  .toggle-dot {
    width: 28px; height: 16px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    position: relative; transition: background var(--transition);
  }
  .toggle-dot::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--text3);
    transition: transform var(--transition), background var(--transition);
  }
  .ruby-toggle.active .toggle-dot { background: rgba(167,139,250,.3); border-color: var(--purple); }
  .ruby-toggle.active .toggle-dot::after { transform: translateX(12px); background: var(--purple); }

  .review-cards { display: flex; flex-direction: column; gap: 16px; }
  .review-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    animation: fadeInUp .35s ease both;
  }
  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .review-card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .review-result-icon { font-size: 16px; }
  .review-q-id { font-size: 11px; font-weight: 800; color: var(--text3); letter-spacing: .06em; }
  .review-section-tag { font-size: 11px; color: var(--text2); }
  .review-card-body { padding: 16px; }
  .review-instruction { font-size: 12px; color: var(--purple); margin-bottom: 6px; }
  .review-q-text { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .review-passage {
    font-size: 12px; color: var(--text2); background: var(--surface2);
    border-radius: 6px; padding: 10px; margin-bottom: 12px;
    white-space: pre-line; max-height: 120px; overflow-y: auto;
    border-left: 3px solid var(--gold);
  }
  .review-choices { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .review-choice {
    font-size: 13px; padding: 8px 12px; border-radius: 6px;
    border: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
  }
  .review-choice.correct-answer {
    background: rgba(34,197,94,.12); border-color: var(--green); color: var(--green);
  }
  .review-choice.user-wrong {
    background: rgba(233,69,96,.12); border-color: var(--accent); color: var(--accent);
  }
  .review-choice.neutral { color: var(--text2); }

  /* Explanation tabs */
  .expl-tabs {
    display: flex; gap: 4px; margin-bottom: 10px;
    border-bottom: 1px solid var(--border); padding-bottom: 8px;
  }
  .expl-tab {
    font-size: 11px; font-weight: 800; padding: 4px 12px;
    border-radius: 99px; cursor: pointer;
    background: transparent; color: var(--text3);
    border: 1px solid transparent;
    transition: all var(--transition);
    letter-spacing: .06em;
  }
  .expl-tab.active {
    background: var(--surface2); border-color: var(--border); color: var(--text);
  }
  .expl-content { font-size: 13px; color: var(--text2); line-height: 1.7; min-height: 40px; }
  .expl-pending { color: var(--text3); font-style: italic; }

  /* Bottom CTA */
  .result-cta {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 32px;
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface2); }
  ::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ruby display */
  ruby rt { font-size: .55em; color: var(--purple); }

  /* Responsive */
  @media (max-width: 480px) {
    .start-stats { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .sections-grid { grid-template-columns: 1fr; }
    .question-split { flex-direction: column; height: auto; }
    .split-left, .split-right { width: 100%; height: auto; max-height: 40vh; }
    .split-left { border-right: none; border-bottom: 1px solid var(--border); }
    .nav-dot { width: 24px; height: 24px; font-size: 9px; }
  }

  /* Misc utilities */
  .hidden { display: none !important; }

<script>
// ════════════════════════════════════════════════════════
//  JFT-Basic CBT System  ·  Engine v2.0
//  STEP1: 親子配管完全修正 / STEP2-3: Web Speech API音声エンジン
//  STEP4: A1/A2レベル選択UI
// ════════════════════════════════════════════════════════

// ── VoiceEngine (Web Speech API) ─────────────────────
const VoiceEngine = (() => {
  let onEndCallback = null;
  let onStartCallback = null;

  function speak(text, lang = 'ja-JP', rate = 0.80, onStart, onEnd) {
    if (!('speechSynthesis' in window)) {
      if (onEnd) onEnd();
      return;
    }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = rate;
    u.onstart = () => { if (onStart) onStart(); };
    u.onend   = () => { if (onEnd)   onEnd();   };
    u.onerror = () => { if (onEnd)   onEnd();   };
    window.speechSynthesis.speak(u);
  }

  function cancel() {
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  }

  return { speak, cancel };
})();

// ── CONSTANTS ────────────────────────────────────────
const LS_KEY     = 'jft_cbt_session';
const TOTAL_TIME = 60 * 60;
const PASS_SCORE = 26;

// Level configs
const LEVEL_CONFIG = {
  A1: {
    dataUrl: 'questions.json',
    label:   'A1 Level',
    sections: {
      '文字・語彙': { count: 10, cutoff: 6,  color: 'vocab',  total: 25 },
      '会話・表現': { count: 10, cutoff: 6,  color: 'conv',   total: 25 },
      '聴解':       { count: 12, cutoff: 8,  color: 'listen', total: 25 },
      '読解':       { count: 8,  cutoff: 5,  color: 'read',   total: 25 },
    },
  },
  A2: {
    dataUrl: 'questions_a2.json',
    label:   'A2 Level',
    sections: {
      '文字・語彙': { count: 8,  cutoff: 5,  color: 'vocab',  total: 27 },
      '文法':       { count: 8,  cutoff: 5,  color: 'conv',   total: 26 },
      '会話・表現': { count: 6,  cutoff: 4,  color: 'listen', total: 16 },
      '読解':       { count: 8,  cutoff: 5,  color: 'read',   total: 19 },
    },
  },
};

// ── STATE ────────────────────────────────────────────
let currentLevel    = 'A1';
let allQuestions    = [];      // raw loaded data
let parentTextCache = {};      // group_id -> parent_text  ← STEP1
let examPool        = [];      // questions only (is_parent=false)
let examQuestions   = [];      // 40-item exam set
let answers         = {};
let currentIdx      = 0;
let timeRemaining   = TOTAL_TIME;
let timerInterval   = null;
let rubyOn          = false;
let reviewLangState = {};
let playCounts      = {};

// ── BOOT ─────────────────────────────────────────────
(async function init() {
  renderSectionChips('A1');
  checkResume();
  show('screen-start', 'flex');
  hide('loading');
})();

// ── LEVEL SELECTION ──────────────────────────────────
function selectLevel(lv) {
  currentLevel = lv;
  document.getElementById('lvcard-a1').classList.toggle('active', lv === 'A1');
  document.getElementById('lvcard-a2').classList.toggle('active', lv === 'A2');
  document.getElementById('start-badge').textContent =
    lv === 'A1' ? '🇯🇵 JFT-Basic A1 Level' : '🇯🇵 JFT-Basic A2 Level';
  renderSectionChips(lv);
  // Clear any saved session for different level
  const saved = loadSession();
  if (saved && saved.level !== lv) {
    document.getElementById('btn-resume').classList.add('hidden');
  } else {
    checkResume();
  }
}

function renderSectionChips(lv) {
  const cfg = LEVEL_CONFIG[lv].sections;
  const container = document.getElementById('section-chips-container');
  const colorMap = { vocab:'vocab', conv:'conv', listen:'listen', read:'read' };
  container.innerHTML = Object.entries(cfg).map(([sec, c]) => `
    <div class="section-chip">
      <div class="dot dot-${c.color}"></div>
      <div class="info">
        <div class="name section-color-${c.color}">${sec}</div>
        <div class="detail">${c.total}問中${c.count}問出題 / 足切:${c.cutoff}問</div>
      </div>
    </div>`).join('');
  // Update total question count display
  const total = Object.values(cfg).reduce((s, c) => s + c.count, 0);
  document.getElementById('stat-questions').textContent = total;
}

// ── LOAD QUESTIONS ───────────────────────────────────
async function loadQuestions() {
  const url = LEVEL_CONFIG[currentLevel].dataUrl;
  const res  = await fetch(url);
  const raw  = await res.json();

  // Normalize
  allQuestions = raw.map(q => ({
    ...q,
    is_parent:      q.is_parent === true || q.is_parent === 'True' || q.is_parent === 'true',
    parent_text:    (q.parent_text === 'None' || q.parent_text === null || q.parent_text === 'null')
                    ? null : q.parent_text,
    correct_answer: Number(q.correct_answer),
  }));

  // ── STEP1: 親テキストキャッシュ ─────────────────────
  // 親レコード（is_parent=true）をキャッシュに格納し、examPoolから除外
  parentTextCache = {};
  examPool = [];
  allQuestions.forEach(q => {
    if (q.is_parent) {
      // 親レコードはpassageキャッシュに格納
      if (q.group_id && q.parent_text) {
        parentTextCache[q.group_id] = q.parent_text;
      }
    } else {
      examPool.push(q);
    }
  });

  // 子レコードのparent_textもキャッシュに追加（子側に格納されている場合）
  allQuestions.forEach(q => {
    if (!q.is_parent && q.group_id && q.parent_text) {
      if (!parentTextCache[q.group_id]) {
        parentTextCache[q.group_id] = q.parent_text;
      }
    }
  });
}

// ── GET PASSAGE (STEP1 fix) ──────────────────────────
function getPassage(q) {
  if (!q.group_id) return '';
  return parentTextCache[q.group_id] || '';
}

// ── CHECK RESUME ─────────────────────────────────────
function checkResume() {
  const saved = loadSession();
  if (saved && saved.examQuestions && saved.level === currentLevel) {
    document.getElementById('btn-resume').classList.remove('hidden');
  } else {
    document.getElementById('btn-resume').classList.add('hidden');
  }
}

// ── FISHER-YATES ─────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── SAMPLING ─────────────────────────────────────────
function sampleQuestions() {
  const cfg = LEVEL_CONFIG[currentLevel].sections;
  const result = [];

  for (const [sec, c] of Object.entries(cfg)) {
    if (sec === '読解') continue; // handled separately
    const pool = examPool.filter(q => q.section === sec);
    result.push(...shuffle(pool).slice(0, c.count));
  }

  // 読解: grouped sampling
  const readingCfg = cfg['読解'];
  if (readingCfg) {
    result.push(...sampleReading(readingCfg.count));
  }

  return result;
}

function sampleReading(targetCount) {
  // Use parentTextCache keys as groups — sample from child (non-parent) questions
  const readingPool = examPool.filter(q => q.section === '読解');

  // Group children by group_id
  const groups = {};
  readingPool.forEach(q => {
    if (q.group_id) {
      if (!groups[q.group_id]) groups[q.group_id] = [];
      groups[q.group_id].push(q);
    }
  });

  // Shuffle group order
  const groupIds = shuffle(Object.keys(groups));
  const selected = [];
  for (const gid of groupIds) {
    if (selected.length >= targetCount) break;
    selected.push(...groups[gid]);
  }
  return selected.slice(0, targetCount);
}

// ── SESSION ──────────────────────────────────────────
function saveSession() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      level: currentLevel, examQuestions, answers, currentIdx, timeRemaining
    }));
  } catch(e) {}
}
function loadSession() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)); } catch(e) { return null; }
}
function clearSession() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

// ── START / RESUME ───────────────────────────────────
document.getElementById('btn-start').addEventListener('click', async () => {
  document.getElementById('loading').style.display = 'flex';
  try {
    await loadQuestions();
    examQuestions   = sampleQuestions();
    answers         = {};
    currentIdx      = 0;
    timeRemaining   = TOTAL_TIME;
    playCounts      = {};
    reviewLangState = {};
    saveSession();
    hide('loading');
    launchExam();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<p style="color:var(--accent);padding:20px;">⚠ ${LEVEL_CONFIG[currentLevel].dataUrl} の読み込みに失敗しました。</p>`;
  }
});

document.getElementById('btn-resume').addEventListener('click', async () => {
  const saved = loadSession();
  if (!saved) return;
  document.getElementById('loading').style.display = 'flex';
  try {
    await loadQuestions();
    // correct_answer をNumber型に確実に再正規化（localStorage経由で文字列化対策）
    examQuestions   = (saved.examQuestions || []).map(q => ({
      ...q, correct_answer: Number(q.correct_answer)
    }));
    answers         = saved.answers || {};
    currentIdx      = saved.currentIdx || 0;
    timeRemaining   = saved.timeRemaining ?? TOTAL_TIME;
    playCounts      = {};
    reviewLangState = {};
    hide('loading');
    launchExam();
  } catch(e) { hide('loading'); }
});

function launchExam() {
  document.getElementById('exam-logo').textContent =
    `JFT-CBT ${currentLevel}`;
  hide('screen-start');
  show('screen-exam', 'flex');
  buildNavDots();
  renderQuestion();
  startTimer();
}

// ── TIMER ────────────────────────────────────────────
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeRemaining--;
    saveSession();
    updateTimerDisplay();
    if (timeRemaining <= 0) { clearInterval(timerInterval); finishExam(true); }
  }, 1000);
}
function updateTimerDisplay() {
  const el = document.getElementById('timer');
  const m  = Math.floor(timeRemaining / 60).toString().padStart(2,'0');
  const s  = (timeRemaining % 60).toString().padStart(2,'0');
  el.textContent = `${m}:${s}`;
  el.classList.toggle('urgent', timeRemaining <= 300);
}

// ── NAV DOTS ─────────────────────────────────────────
function buildNavDots() {
  const c = document.getElementById('progress-nav-inner');
  c.innerHTML = '';
  examQuestions.forEach((q, i) => {
    const d = document.createElement('button');
    d.className = 'nav-dot unanswered';
    d.textContent = i + 1;
    d.title = `Q${i+1}: ${q.section}`;
    d.addEventListener('click', () => { currentIdx = i; renderQuestion(); });
    c.appendChild(d);
  });
}
function updateNavDots() {
  document.querySelectorAll('.nav-dot').forEach((d, i) => {
    d.classList.remove('unanswered','answered','current');
    d.classList.add(answers[i] != null ? 'answered' : 'unanswered');
    if (i === currentIdx) d.classList.add('current');
  });
  document.querySelectorAll('.nav-dot')[currentIdx]
    ?.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

// ── RENDER QUESTION ──────────────────────────────────
function renderQuestion() {
  if (!examQuestions[currentIdx]) return;
  const q   = examQuestions[currentIdx];
  const cfg = LEVEL_CONFIG[currentLevel].sections;
  const sc  = cfg[q.section] || { color: 'vocab' };

  const badge = document.getElementById('section-badge');
  badge.textContent   = q.section;
  badge.className     = `section-badge-header section-color-${sc.color}`;
  badge.style.border  = '1px solid currentColor';
  badge.style.borderRadius = '99px';
  badge.style.padding = '3px 10px';
  badge.style.fontSize= '11px';
  badge.style.fontWeight='700';

  document.getElementById('btn-prev').disabled = currentIdx === 0;
  const isLast = currentIdx === examQuestions.length - 1;
  document.getElementById('btn-next').classList.toggle('hidden', isLast);
  document.getElementById('btn-finish').classList.toggle('hidden', !isLast);
  document.getElementById('q-progress-text').textContent =
    `${currentIdx + 1} / ${examQuestions.length}`;

  updateNavDots();

  const main = document.getElementById('exam-main');
  if      (q.layout_type === 'split_2screen') renderSplit(q, main);
  else if (q.layout_type === 'cbt_card')      renderCbtCard(q, main);
  else                                         renderStandard(q, main);
}

function getChoices(q) {
  return [q.choice_1, q.choice_2, q.choice_3, q.choice_4]
    .filter(c => c && c.trim() !== '');
}

function renderChoices(q, container) {
  const choices = getChoices(q);
  const labels  = ['①','②','③','④'];
  const div     = document.createElement('div');
  div.className = 'choices';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    // 試験中は選択状態（青）のみ表示。正誤（緑・赤）は復習モードのみ
    btn.className = 'choice-btn' + (answers[currentIdx] === i+1 ? ' selected' : '');
    if (q.section === '聴解') btn.disabled = (playCounts[currentIdx] || 0) === 0;
    btn.innerHTML = `<span class="choice-label">${labels[i]}</span><span>${c}</span>`;
    btn.addEventListener('click', () => {
      answers[currentIdx] = i + 1;
      saveSession();
      renderQuestion();
    });
    div.appendChild(btn);
  });
  container.appendChild(div);
}

function renderStandard(q, container) {
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'question-standard';
  if (q.instruction) {
    const instr = document.createElement('div');
    instr.className = 'q-instruction';
    instr.textContent = q.instruction;
    wrap.appendChild(instr);
  }
  const meta = document.createElement('div');
  meta.className = 'q-meta';
  meta.innerHTML = `<span class="q-num">Q${currentIdx+1}</span>
    <span class="q-section-tag">${q.section} · ${q.source_lesson}</span>`;
  wrap.appendChild(meta);
  const qt = document.createElement('div');
  qt.className = 'q-text';
  qt.textContent = q.question_text || q.instruction;
  wrap.appendChild(qt);
  renderChoices(q, wrap);
  container.appendChild(wrap);
}

// ── STEP2-3: CbtCard with Web Speech API ─────────────
function renderCbtCard(q, container) {
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'question-standard';

  const meta = document.createElement('div');
  meta.className = 'q-meta';
  meta.innerHTML = `<span class="q-num">Q${currentIdx+1}</span>
    <span class="q-section-tag">聴解 · ${q.source_lesson}</span>`;
  wrap.appendChild(meta);

  // ── スクリプト抽出（A1/A2両対応）────────────────
  const instrRaw = q.instruction || '';
  const scriptMatch = instrRaw.match(/【音声スクリプト：([\s\S]+?)】/);

  // 読み上げテキストの優先順位:
  // 1. q.reading_text（ふりがな専用フィールド）← 最優先
  // 2. 【音声スクリプト：...】から抽出してカッコ除去したもの
  const rawScript = scriptMatch ? scriptMatch[1] : '';
  const cleanedScript = rawScript
    .replace(/（[ぁ-んァ-ン\s・ーa-zA-Z0-9]+）/g, '')
    .replace(/\([ぁ-んァ-ン\s・ーa-zA-Z0-9]+\)/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  const scriptText = (q.reading_text && q.reading_text.trim())
    ? q.reading_text.trim()
    : cleanedScript;

  // 問題文：【】以降のテキスト、またはquestion_text
  const questionText = scriptMatch
    ? instrRaw.replace(/【音声スクリプト：[\s\S]+?】/, '').trim()
    : (q.question_text || instrRaw);

  // ── 問題指示文 ───────────────────────────────────
  const instr = document.createElement('div');
  instr.className = 'q-instruction';
  instr.textContent = '音声を聴いて、質問に答えてください。';
  wrap.appendChild(instr);

  // ── 音声プレイヤー ───────────────────────────────
  const cnt       = playCounts[currentIdx] || 0;
  const remaining = 2 - cnt;

  const audioBox = document.createElement('div');
  audioBox.className = 'audio-player-box';

  // スクリプト（非表示・音声読み上げ用）
  if (scriptText) {
    const scriptDiv = document.createElement('div');
    scriptDiv.className = 'audio-script audio-script--hidden';
    scriptDiv.textContent = scriptText;
    audioBox.appendChild(scriptDiv);
  }

  const controls = document.createElement('div');
  controls.className = 'audio-controls';

  const playBtn = document.createElement('button');
  playBtn.className = 'btn-play';
  playBtn.id = `play-btn-${currentIdx}`;

  if (!scriptText) {
    // A2など音声スクリプトがない場合
    playBtn.textContent = '🔇 音声データなし';
    playBtn.disabled = true;
  } else if (remaining <= 0) {
    playBtn.textContent = '✓ 再生完了';
    playBtn.disabled = true;
  } else {
    playBtn.textContent = `▶ 音声を再生（残り${remaining}回）`;
  }

  const countSpan = document.createElement('span');
  countSpan.className = 'play-count';
  countSpan.textContent = scriptText ? `${cnt}/2` : '-';

  // ── STEP2-3: 音声イベント配管 ────────────────────
  if (scriptText) {
    playBtn.addEventListener('click', () => {
      if ((playCounts[currentIdx] || 0) >= 2) return;
      playBtn.disabled = true;
      playBtn.textContent = '⏳ 音声準備中...';
      playBtn.style.opacity = '0.6';

      VoiceEngine.speak(
        scriptText, 'ja-JP', 0.80,
        () => {
          playBtn.textContent = '🔊 再生中（連打禁止）';
          playBtn.style.opacity = '1';
        },
        () => {
          if (!playCounts[currentIdx]) playCounts[currentIdx] = 0;
          playCounts[currentIdx]++;
          const newRemaining = 2 - playCounts[currentIdx];
          if (newRemaining > 0) {
            playBtn.textContent = `▶ 音声を再生（残り${newRemaining}回）`;
            playBtn.disabled = false;
            playBtn.style.opacity = '1';
          } else {
            playBtn.textContent = '✓ 再生完了';
            playBtn.disabled = true;
          }
          countSpan.textContent = `${playCounts[currentIdx]}/2`;
          renderQuestion();
        }
      );
    });
  }

  controls.appendChild(playBtn);
  controls.appendChild(countSpan);
  audioBox.appendChild(controls);
  wrap.appendChild(audioBox);

  // ── 問題文（1回だけ表示） ────────────────────────
  if (questionText) {
    const qt = document.createElement('div');
    qt.className = 'q-text';
    qt.textContent = questionText;
    wrap.appendChild(qt);
  }

  renderChoices(q, wrap);
  container.appendChild(wrap);
}

// ── STEP1: renderSplit with fixed passage lookup ──────
function renderSplit(q, container) {
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'question-split';

  // Left: passage from cache (STEP1 fix)
  const left    = document.createElement('div');
  left.className = 'split-left';
  const passage  = getPassage(q);   // ← parentTextCacheから安全に逆引き

  const passLabel = document.createElement('div');
  passLabel.className = 'passage-label';
  passLabel.textContent = '📄 案内文・本文';
  left.appendChild(passLabel);

  const passText = document.createElement('div');
  passText.className = 'passage-text';
  passText.textContent = passage || '（本文データ読み込み中…）';
  left.appendChild(passText);

  // Right: question
  const right = document.createElement('div');
  right.className = 'split-right';

  const meta = document.createElement('div');
  meta.className = 'q-meta';
  meta.style.marginBottom = '12px';
  meta.innerHTML = `<span class="q-num">Q${currentIdx+1}</span>
    <span class="q-section-tag">読解 · ${q.source_lesson}</span>`;
  right.appendChild(meta);

  if (q.instruction) {
    const instr = document.createElement('div');
    instr.className = 'q-instruction';
    instr.style.marginBottom = '12px';
    instr.textContent = q.instruction;
    right.appendChild(instr);
  }

  const qt = document.createElement('div');
  qt.className = 'q-text';
  qt.style.fontSize = '16px';
  qt.textContent = q.question_text || '下の問題に答えてください。';
  right.appendChild(qt);

  renderChoices(q, right);
  wrap.appendChild(left);
  wrap.appendChild(right);
  container.appendChild(wrap);
}

// ── NAVIGATION ───────────────────────────────────────
function nextQuestion() {
  if (currentIdx < examQuestions.length - 1) { currentIdx++; renderQuestion(); }
}
document.getElementById('btn-next').addEventListener('click', nextQuestion);
document.getElementById('btn-prev').addEventListener('click', () => {
  if (currentIdx > 0) { currentIdx--; renderQuestion(); }
});
document.getElementById('btn-finish').addEventListener('click', () => {
  const unanswered = examQuestions.length - Object.keys(answers).length;
  if (unanswered > 0 && !confirm(`まだ${unanswered}問が未解答です。終了しますか？`)) return;
  finishExam(false);
});

// ── FINISH & SCORE ───────────────────────────────────
function finishExam(timedOut) {
  clearInterval(timerInterval);
  VoiceEngine.cancel();
  clearSession();
  hide('screen-exam');

  const cfg = LEVEL_CONFIG[currentLevel].sections;
  const sectionScores = {};
  Object.keys(cfg).forEach(s => { sectionScores[s] = { correct: 0, total: 0 }; });
  let totalCorrect = 0;

  examQuestions.forEach((q, i) => {
    if (sectionScores[q.section]) {
      sectionScores[q.section].total++;
      if (answers[i] === Number(q.correct_answer)) {   // 型保証
        sectionScores[q.section].correct++;
        totalCorrect++;
      }
    }
  });

  let failedSection = null;
  for (const [sec, c] of Object.entries(cfg)) {
    if ((sectionScores[sec]?.correct || 0) < c.cutoff) { failedSection = sec; break; }
  }
  const passed = !failedSection && totalCorrect >= PASS_SCORE;

  renderResult({ sectionScores, totalCorrect, passed, failedSection, timedOut });
  show('screen-result', 'flex');
  window.scrollTo(0, 0);
}

// ── RENDER RESULT ────────────────────────────────────
function renderResult({ sectionScores, totalCorrect, passed, failedSection, timedOut }) {
  const cfg = LEVEL_CONFIG[currentLevel].sections;
  const TOTAL_Q = Object.values(cfg).reduce((s,c) => s + c.count, 0);

  const verdictEl = document.getElementById('result-verdict');
  let reasonText = '';
  if (!passed) {
    reasonText = failedSection
      ? `「${failedSection}」セクションの足切り基準（${cfg[failedSection].cutoff}問）未満`
      : `総得点不足（合格基準: ${PASS_SCORE}問 / ${TOTAL_Q}問）`;
  }
  if (timedOut) reasonText = '⏱ 制限時間終了 · ' + reasonText;
  const pct = Math.round(totalCorrect / TOTAL_Q * 100);

  verdictEl.innerHTML = `
    <div class="verdict-icon">${passed ? '🎉' : '📚'}</div>
    <div class="verdict-label">総合判定 · ${currentLevel}</div>
    <div class="verdict-text ${passed ? 'pass' : 'fail'}">${passed ? '合 格' : '不合格'}</div>
    ${reasonText ? `<div class="verdict-reason" style="color:var(--accent);font-weight:700;margin-top:8px;">${reasonText}</div>` : ''}
    <div class="verdict-score">
      <span class="big" style="color:${passed?'var(--green)':'var(--accent)'}">${totalCorrect}</span>
      <span class="slash">/</span><span class="small">${TOTAL_Q}</span>
      <span class="pct">${pct}%</span>
    </div>`;

  const scoresEl = document.getElementById('section-scores');
  scoresEl.innerHTML = '';
  for (const [sec, c] of Object.entries(cfg)) {
    const sc    = sectionScores[sec] || { correct:0, total:c.count };
    const isPass = sc.correct >= c.cutoff;
    const sPct   = sc.total ? Math.round(sc.correct / sc.total * 100) : 0;
    const cPct   = Math.round(c.cutoff / c.count * 100);
    const card   = document.createElement('div');
    card.className = 'section-score-card';
    card.innerHTML = `
      <div class="section-score-header">
        <span class="section-score-name section-color-${c.color}">${sec}</span>
        <span class="section-score-nums ${isPass?'pass':'fail'}">${sc.correct}/${sc.total} (${sPct}%) ${isPass?'✓ クリア':'✗ 足切警告'}</span>
      </div>
      <div class="score-bar-track">
        <div class="score-bar-fill ${isPass?'pass':'fail'} bar-${c.color}" style="width:0%" data-target="${sPct}%"></div>
        <div class="cutoff-marker" style="left:${cPct}%">
          <div class="cutoff-label">足切(${c.cutoff}問)</div>
        </div>
      </div>`;
    scoresEl.appendChild(card);
  }
  requestAnimationFrame(() => {
    document.querySelectorAll('.score-bar-fill').forEach(b => { b.style.width = b.dataset.target; });
  });

  // Untested message
  const testedIds = new Set(examQuestions.map(q => q.question_id));
  const untested  = examPool.filter(q => !testedIds.has(q.question_id));
  const untestedBox = document.getElementById('untested-box');
  if (untested.length > 0) {
    const sample  = shuffle(untested).slice(0, 3);
    const lessons = [...new Set(sample.map(q => q.source_lesson))].slice(0, 2);
    const ids     = sample.map(q => q.question_id).join('・');
    untestedBox.style.display = 'block';
    untestedBox.innerHTML = `
      <h3>📦 プールにはまだ解いていない問題が眠っています！</h3>
      <p>今回未出題の <strong style="color:var(--gold)">${untested.length}問</strong> がプールに残っています。<br>
      例えば「${lessons.join('・')}」の問題（${ids} など）はまだ未挑戦です。<br>
      完全制覇を目指してもう一度挑戦しましょう！💪</p>`;
  } else {
    untestedBox.style.display = 'none';
  }

  renderReviewCards();
}

// ── REVIEW ───────────────────────────────────────────
function renderReviewCards() {
  const c = document.getElementById('review-cards');
  c.innerHTML = '';
  examQuestions.forEach((q, i) => c.appendChild(buildReviewCard(q, i)));
}

function buildReviewCard(q, idx) {
  const userAnswer = answers[idx];
  const correct    = Number(q.correct_answer);   // 型保証
  const isCorrect  = userAnswer === correct;
  const choices    = getChoices(q);
  const labels     = ['①','②','③','④'];
  const lang       = reviewLangState[idx] || 'jp';
  const cfg        = LEVEL_CONFIG[currentLevel].sections;
  const sc         = cfg[q.section] || { color:'vocab' };

  const card = document.createElement('div');
  card.className = 'review-card';
  card.style.animationDelay = `${idx * 0.03}s`;

  const header = document.createElement('div');
  header.className = 'review-card-header';
  header.innerHTML = `
    <span class="review-result-icon">${isCorrect ? '✅' : '❌'}</span>
    <span class="review-q-id">${q.question_id} · Q${idx+1}</span>
    <span class="review-section-tag section-color-${sc.color}">${q.section}</span>
    ${!isCorrect && userAnswer ? `<span style="font-size:11px;color:var(--accent);margin-left:auto">あなたの回答: ${labels[userAnswer-1]}</span>` : ''}
    ${!userAnswer ? `<span style="font-size:11px;color:var(--text3);margin-left:auto">未解答</span>` : ''}`;
  card.appendChild(header);

  const body = document.createElement('div');
  body.className = 'review-card-body';

  if (q.instruction) {
    const instr = document.createElement('div');
    instr.className = 'review-instruction';
    instr.textContent = q.instruction.replace(/【音声スクリプト：.*?】/s,'').trim();
    body.appendChild(instr);
  }

  const passage = getPassage(q);
  if (passage) {
    const pt = document.createElement('div');
    pt.className = 'review-passage';
    pt.textContent = passage;
    body.appendChild(pt);
  }

  const qtDiv = document.createElement('div');
  qtDiv.className = 'review-q-text';
  const plain = q.question_text || q.instruction || '';
  qtDiv.dataset.plain = plain;
  qtDiv.dataset.ruby  = q.question_text_ruby || '';
  qtDiv.innerHTML = (rubyOn && q.question_text_ruby && q.question_text_ruby.trim() !== '')
    ? q.question_text_ruby : plain;
  body.appendChild(qtDiv);

  const choicesDiv = document.createElement('div');
  choicesDiv.className = 'review-choices';
  choices.forEach((c, i) => {
    const div = document.createElement('div');
    const isCorrectChoice = (i+1) === correct;
    const isUserChoice    = (i+1) === userAnswer;
    div.className = 'review-choice ' +
      (isCorrectChoice ? 'correct-answer' : isUserChoice ? 'user-wrong' : 'neutral');
    div.innerHTML = `<span>${labels[i]}</span><span>${c}</span>
      ${isCorrectChoice ? '<span style="margin-left:auto;font-size:11px">✓ 正解</span>' : ''}`;
    choicesDiv.appendChild(div);
  });
  body.appendChild(choicesDiv);

  // Explanation tabs
  const tabs = document.createElement('div');
  tabs.className = 'expl-tabs';
  ['jp','en','tl'].forEach(l => {
    const tab = document.createElement('button');
    tab.className = 'expl-tab' + (lang === l ? ' active' : '');
    tab.textContent = l === 'jp' ? 'JP' : l === 'en' ? 'EN' : 'TL';
    tab.dataset.lang = l;
    tab.addEventListener('click', () => {
      reviewLangState[idx] = l;
      tabs.querySelectorAll('.expl-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === l));
      exContent.innerHTML = getExplanation(q, l);
    });
    tabs.appendChild(tab);
  });
  body.appendChild(tabs);

  const exContent = document.createElement('div');
  exContent.className = 'expl-content';
  exContent.innerHTML = getExplanation(q, lang);
  body.appendChild(exContent);

  card.appendChild(body);
  return card;
}

function getExplanation(q, lang) {
  const base = q.explanation || '（解説データなし）';
  if (lang === 'jp') return base;
  if (lang === 'en') return q.explanation_en?.trim()
    ? q.explanation_en
    : `<span class="expl-pending">[Translation pending]</span><br><span style="opacity:.7">${base}</span>`;
  if (lang === 'tl') return q.explanation_tl?.trim()
    ? q.explanation_tl
    : `<span class="expl-pending">[Pagsasalin sa paglaon]</span><br><span style="opacity:.7">${base}</span>`;
  return '';
}

// ── RUBY TOGGLE ──────────────────────────────────────
document.getElementById('ruby-toggle').addEventListener('click', () => {
  rubyOn = !rubyOn;
  document.getElementById('ruby-toggle').classList.toggle('active', rubyOn);
  document.querySelectorAll('.review-q-text').forEach(el => {
    const ruby = el.dataset.ruby, plain = el.dataset.plain;
    el.innerHTML = (rubyOn && ruby && ruby.trim() !== '') ? ruby : plain;
  });
});

// ── RETRY ────────────────────────────────────────────
document.getElementById('btn-retry').addEventListener('click', async () => {
  hide('screen-result');
  clearSession();
  document.getElementById('loading').style.display = 'flex';
  try {
    await loadQuestions();
    examQuestions   = sampleQuestions();
    answers         = {};
    currentIdx      = 0;
    timeRemaining   = TOTAL_TIME;
    playCounts      = {};
    reviewLangState = {};
    saveSession();
    hide('loading');
    launchExam();
  } catch(e) { hide('loading'); }
});

// ── TOAST HELPER ─────────────────────────────────────
function showToast(message, duration = 2800) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

// ── SHARE RESULT ─────────────────────────────────────
document.getElementById('btn-share').addEventListener('click', () => {

  // 結果画面でのみ動作（examQuestionsが空なら何もしない）
  if (!examQuestions || examQuestions.length === 0) {
    showToast('⚠ 試験を受けてから共有してください');
    return;
  }

  const cfg     = LEVEL_CONFIG[currentLevel].sections;
  const TOTAL_Q = Object.values(cfg).reduce((s, c) => s + c.count, 0);

  // ── スコア集計 ────────────────────────────────────
  let totalCorrect = 0;
  const sectionScores = {};
  Object.keys(cfg).forEach(s => { sectionScores[s] = { correct: 0, total: 0 }; });

  examQuestions.forEach((q, i) => {
    if (sectionScores[q.section]) {
      sectionScores[q.section].total++;
      if (answers[i] === Number(q.correct_answer)) {
        sectionScores[q.section].correct++;
        totalCorrect++;
      }
    }
  });

  // ── 合否判定 ──────────────────────────────────────
  let failedSection = null;
  for (const [sec, c] of Object.entries(cfg)) {
    if ((sectionScores[sec]?.correct || 0) < c.cutoff) {
      failedSection = sec; break;
    }
  }
  const passed = !failedSection && totalCorrect >= PASS_SCORE;
  const pct    = Math.round(totalCorrect / TOTAL_Q * 100);

  // ── セクション別ライン ────────────────────────────
  const sectionLines = Object.entries(cfg).map(([sec, c]) => {
    const sc     = sectionScores[sec] || { correct: 0, total: c.count };
    const isPass = sc.correct >= c.cutoff;
    const bar    = '█'.repeat(sc.correct) + '░'.repeat(sc.total - sc.correct);
    return `  ${isPass ? '✅' : '❌'} ${sec}：${sc.correct}/${sc.total}問 [${bar}]`;
  });

  // ── 正誤＋解説ライン ─────────────────────────────
  const markRow = examQuestions.map((q, i) => {
    if (answers[i] == null) return '➖';
    return answers[i] === Number(q.correct_answer) ? '⭕' : '❌';
  }).join('');

  const detailLines = examQuestions.map((q, i) => {
    const mark      = answers[i] == null ? '➖' : answers[i] === Number(q.correct_answer) ? '⭕' : '❌';
    const choices   = [q.choice_1, q.choice_2, q.choice_3, q.choice_4].filter(c => c && c.trim());
    const labels    = ['①','②','③','④'];
    const correct   = Number(q.correct_answer);
    const userAns   = answers[i];
    const correctTxt= choices[correct - 1] || '';
    const userTxt   = userAns ? (choices[userAns - 1] || '?') : '未解答';
    const expl      = q.explanation || '';

    const lines = [
      `Q${i+1} ${mark} [${q.section}]`,
      `　${q.question_text || q.instruction || ''}`,
      `　正解：${labels[correct-1]} ${correctTxt}${userAns && userAns !== correct ? `　あなた：${labels[userAns-1]} ${userTxt}` : ''}`,
    ];
    if (expl) lines.push(`　💡 ${expl}`);
    return lines.join('\n');
  }).join('\n\n');

  // ── テキスト組み立て ──────────────────────────────
  const now       = new Date();
  const dateStr   = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
  const shareText = [
    `━━━━━━━━━━━━━━━━━━━━`,
    `📝 JFT模試・結果報告`,
    `━━━━━━━━━━━━━━━━━━━━`,
    `📅 ${dateStr}　レベル：${currentLevel}`,
    ``,
    `${passed ? '🎉 判定：合格！' : '📚 判定：不合格'}`,
    `🏆 スコア：${totalCorrect} / ${TOTAL_Q}問（${pct}%）`,
    ``,
    `📊 セクション別：`,
    ...sectionLines,
    ``,
    `📋 正誤一覧：${markRow}`,
    ``,
    `━━ 問題別・解説 ━━`,
    detailLines,
    ``,
    `🔗 https://jft-moktest.vercel.app`,
    `━━━━━━━━━━━━━━━━━━━━`,
  ].join('\n');

  // ── クリップボードにコピー ────────────────────────
  const btn = document.getElementById('btn-share');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(shareText)
      .then(() => {
        btn.innerHTML = '✅ コピーしました！SNSに貼り付けてください';
        btn.classList.add('copied');
        showToast('📋 クリップボードにコピーしました！');
        setTimeout(() => {
          btn.innerHTML = '📋 結果をコピーして共有する';
          btn.classList.remove('copied');
        }, 3000);
      })
      .catch(() => fallbackCopy(shareText, btn));
  } else {
    fallbackCopy(shareText, btn);
  }
});

// clipboard API非対応ブラウザ向けフォールバック
function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    document.execCommand('copy');
    btn.innerHTML = '✅ コピーしました！';
    btn.classList.add('copied');
    showToast('📋 クリップボードにコピーしました！');
    setTimeout(() => {
      btn.innerHTML = '📋 結果をコピーして共有する';
      btn.classList.remove('copied');
    }, 3000);
  } catch(e) {
    // 最終フォールバック: テキストをそのまま表示
    prompt('以下のテキストをコピーしてください：', text);
  }
  document.body.removeChild(ta);
}

// ── HELPERS ──────────────────────────────────────────
function show(id, display='block') {
  const el = document.getElementById(id);
  if (el) { el.style.display = display; el.classList.add('active'); }
}
function hide(id) {
  const el = document.getElementById(id);
  if (el) { el.style.display = 'none'; el.classList.remove('active'); }
}
